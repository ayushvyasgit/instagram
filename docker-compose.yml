version: "3.8"

services:

  # ----------------------------------
  # NGINX (Production Reverse Proxy)
  # ----------------------------------
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
      - frontend
    networks:
      - backend

  # ----------------------------------
  # Backend API
  # ----------------------------------
  backend:
    build: ./backend
    container_name: instagram_backend
    restart: always
    env_file:
      - .local.env
    depends_on:
      - postgres
      - redis_cache
      - redis_rate
      - minio
      - kafka
    networks:
      - backend

  # ----------------------------------
  # Frontend (Production Build)
  # ----------------------------------
  frontend:
    build: ./frontend
    container_name: instagram_frontend
    restart: always
    env_file:
      - .local.env
    networks:
      - backend

  # ----------------------------------
  # PostgreSQL
  # ----------------------------------
  postgres:
    image: postgres:17-alpine
    container_name: postgres
    restart: always
    env_file:
      - .local.env
    # POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB
    # are read directly from .local.env by the image
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ----------------------------------
  # Redis - Cache
  # ----------------------------------
  redis_cache:
    image: redis:7
    container_name: redis_cache
    restart: always
    networks:
      - backend

  # ----------------------------------
  # Redis - Rate Limit
  # ----------------------------------
  redis_rate:
    image: redis:7
    container_name: redis_rate
    restart: always
    networks:
      - backend

  # ----------------------------------
  # MinIO
  # ----------------------------------
  minio:
    image: minio/minio
    container_name: minio
    command: server /data
    restart: always
    env_file:
      - .local.env
    environment:
      MINIO_ROOT_USER: admin              # matches .local.env
      MINIO_ROOT_PASSWORD: strongminio123 # matches .local.env
    volumes:
      - minio_data:/data
    networks:
      - backend

  # ----------------------------------
  # Zookeeper
  # ----------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - backend

  # ----------------------------------
  # Kafka
  # ----------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: always
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - backend

networks:
  backend: {}

volumes:
  postgres_data:
  minio_data: